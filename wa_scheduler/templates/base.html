<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>wa-scheduler</title>
    <link rel="icon" href="{{ url_for('static', path='/logo.svg') }}" type="image/svg+xml" />
    <link rel="stylesheet" href="{{ url_for('static', path='/styles.css') }}" />
    <link href="https://cdn.jsdelivr.net/npm/select2@4.1.0-rc.0/dist/css/select2.min.css" rel="stylesheet" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr@4.6.13/dist/flatpickr.min.css" />
    <script src="https://cdn.jsdelivr.net/npm/jquery@3.7.1/dist/jquery.min.js"></script>
  </head>
  <body>
    <header class="site-header">
      <a class="brand" href="/">
        <img class="brand-mark" src="{{ url_for('static', path='/logo.svg') }}" alt="" aria-hidden="true" />
        <div>
          <p class="eyebrow">Self-hosted personal WhatsApp scheduler</p>
          <h1>wa-scheduler</h1>
        </div>
      </a>
      <nav>
        <a href="/"><i data-lucide="layout-dashboard"></i>Dashboard</a>
        <a href="/contacts"><i data-lucide="users"></i>Contacts</a>
        <a href="/chats"><i data-lucide="message-circle"></i>Chats</a>
        <a href="/templates"><i data-lucide="file-text"></i>Templates</a>
        <a href="/schedules"><i data-lucide="calendar"></i>Schedules</a>
        <a href="/recurring"><i data-lucide="repeat"></i>Recurring</a>
        <a href="/settings"><i data-lucide="settings"></i>Settings</a>
        <a href="/send-now"><i data-lucide="send"></i>Send Now</a>
        <a href="/runs"><i data-lucide="activity"></i>Runs</a>
      </nav>
      <script src="https://unpkg.com/lucide@0.454.0/dist/umd/lucide.js"></script>
      <script>
        lucide.createIcons();
      </script>
    </header>

    <main class="container">
      {% if notice %}
      <div class="notice">{{ notice }}</div>
      {% endif %}
      {% block content %}{% endblock %}
    </main>
    <script src="https://cdn.jsdelivr.net/npm/select2@4.1.0-rc.0/dist/js/select2.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/flatpickr@4.6.13/dist/flatpickr.min.js"></script>
    <script>
      document.addEventListener('DOMContentLoaded', function() {
        // Initialize Select2 on all select elements
        document.querySelectorAll('select').forEach(function(select) {
          if (select.closest('[data-select2-disabled]')) return;
          $(select).select2({
            width: '100%',
            closeOnSelect: true,
            allowClear: true,
            placeholder: select.dataset.placeholder || 'Select an option',
            dropdownParent: $(select).closest('form')
          });
        });

        if (window.flatpickr) {
          const flatpickrOptions = {
            time: {
              enableTime: true,
              noCalendar: true,
              dateFormat: 'H:i',
              time_24hr: true,
              minuteIncrement: 5,
              allowInput: true,
            },
            datetime: {
              enableTime: true,
              dateFormat: 'Y-m-d\\TH:i',
              time_24hr: true,
              minuteIncrement: 5,
              allowInput: true,
            },
          };

          document.querySelectorAll('[data-flatpickr]').forEach(function(input) {
            const options = flatpickrOptions[input.dataset.flatpickr];
            if (!options) return;
            window.flatpickr(input, options);
          });
        }
      });
    </script>
    <script defer src="{{ url_for('static', path='/app.js') }}"></script>
  </body>
  </html>
